# TB3 burger 파라미터 (EKF 사용판) — turtlebot3_bringup/param/burger.yaml 복사 후:
#   odometry.publish_tf: false  ← odom→base_footprint TF는 EKF가 발행 (이중 TF 방지)
#   odometry.use_imu:    false  ← 휠 오도메트리는 순수 휠 값만 — IMU 융합은 EKF가 전담
#                                 (TB3 내부 융합과 EKF 융합의 이중 반영 방지)
/**:
  turtlebot3_node:
    ros__parameters:

      enable_stamped_cmd_vel: true

      opencr:
        id: 200
        baud_rate: 1000000
        protocol_version: 2.0

      wheels:
        separation: 0.160
        radius: 0.033

      motors:
        profile_acceleration_constant: 214.577

        # [rev/min2]
        # ref) http://emanual.robotis.com/docs/en/dxl/x/xl430-w250/#profile-acceleration
        profile_acceleration: 0.0

      sensors:
        bumper_1: 0
        bumper_2: 0
        illumination: 0
        ir: 0
        sonar: 0
/**:
  diff_drive_controller:
    ros__parameters:

      odometry:
        publish_tf: false
        use_imu: false
        frame_id: "odom"
        child_frame_id: "base_footprint"
