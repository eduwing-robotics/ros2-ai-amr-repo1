# robot_localization EKF — 휠 오도메트리(/odom) + IMU(/imu) 융합 → odom→base_footprint TF
# 전제: diff_drive_controller.odometry.publish_tf=false (burger_ekf.yaml로 오버라이드)
ekf_filter_node:
  ros__parameters:
    # 20Hz: Pi CPU 공유(nav2와 같은 기기) 부담 완화. 소비자 전수 확인(2026-07-13):
    # controller 10Hz·costmap 5/1Hz·AMCL(tol 0.5s) 전부 2배 이상 여유,
    # 도킹은 raw /odom 직구독이라 무관. 유일한 얇은 지점 = Rotation Shim의
    # "now" TF 조회(0.1s 대기 vs 발행 틈 50ms) — 간헐 U턴 재발 시
    # transform_time_offset: 0.05 추가가 1순위 처방.
    frequency: 20.0
    two_d_mode: true                 # 평면 로봇
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom                # odom→base_footprint 발행

    # 휠 오도메트리 /odom — 속도만 융합 (절대위치는 드리프트라 제외)
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # IMU /imu — yaw + 각속도 + 선가속도 (회전 정밀도 핵심)
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
