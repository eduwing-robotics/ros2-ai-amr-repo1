# robot_localization EKF — 휠 오도메트리(/odom) + IMU(/imu) 융합 → odom→base_footprint TF
# 전제: diff_drive_controller.odometry.publish_tf=false (burger_ekf.yaml로 오버라이드)
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true                 # 평면 로봇
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom                # odom→base_footprint 발행

    # 휠 오도메트리 /odom — 속도만 융합 (절대위치는 드리프트라 제외)
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # IMU /imu — yaw + 각속도 + 선가속도 (회전 정밀도 핵심)
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
